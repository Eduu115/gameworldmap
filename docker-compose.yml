services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gameworld
      POSTGRES_USER: gameworld
      POSTGRES_PASSWORD: gameworld_pass
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gameworld']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://gameworld:gameworld_pass@postgres:5432/gameworld
      PORT: 3001
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src

volumes:
  pgdata:
